<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Seguridad - Cielo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Función para pedir contraseña
        function accederAdmin(url) {
            let password = prompt("Área Restringida. Ingrese la contraseña de administrador:");
            // Cambia 'CieloAdmin' por la contraseña que tú quieras
            if (password === "CieloAdmin") {
                window.location.href = url;
            } else if (password !== null) {
                alert("Contraseña incorrecta. Acceso denegado.");
            }
        }
    </script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-4xl w-full p-6">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white uppercase tracking-widest">Cielo Parque Residencial</h1>
            <p class="text-blue-400">Plataforma de Gestión de Seguridad</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-xl">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Reclutamiento (Nuevos)</h2>
                <div class="space-y-4">
                    <a href="index.html" class="block w-full bg-blue-600 text-white text-center font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow">1. Test para Aspirantes</a>
                    <button onclick="accederAdmin('admin.html')" class="block w-full bg-gray-800 text-white text-center font-bold py-3 rounded-lg hover:bg-gray-900 transition shadow flex justify-center items-center">
                        🔒 3. Evaluación de Aspirantes
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-xl border-t-4 border-green-500">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Personal Activo (Actualización)</h2>
                <div class="space-y-4">
                    <a href="evaluacion-activos.html" class="block w-full bg-green-600 text-white text-center font-bold py-3 rounded-lg hover:bg-green-700 transition shadow">2. Test para Elementos Activos</a>
                    <button onclick="accederAdmin('admin-activos.html')" class="block w-full bg-gray-800 text-white text-center font-bold py-3 rounded-lg hover:bg-gray-900 transition shadow flex justify-center items-center">
                        🔒 4. Evaluación de Agentes Activos
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
