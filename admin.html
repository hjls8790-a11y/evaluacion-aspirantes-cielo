<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitácora de Reclutamiento - Privado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-900 p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">
        <div class="bg-blue-800 p-6 text-white flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">Cielo Parque Residencial - Bitácora de Aspirantes</h1>
            <button onclick="fetchData()" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-500 font-bold">🔄 Actualizar Lista</button>
        </div>
        
        <div class="p-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-100 text-gray-600 uppercase text-sm font-bold">
                        <th class="p-3 border-b">Fecha</th>
                        <th class="p-3 border-b">Nombre del Aspirante</th>
                        <th class="p-3 border-b text-center">Confiab.</th>
                        <th class="p-3 border-b text-center">Perm.</th>
                        <th class="p-3 border-b text-center">Reglas</th>
                        <th class="p-3 border-b text-center">Punt.</th>
                        <th class="p-3 border-b">Dictamen</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeiIBgmX4KKhdQlwyyXCoI-zGZdFc0aso",
            authDomain: "evaluacion-cielo.firebaseapp.com",
            projectId: "evaluacion-cielo",
            storageBucket: "evaluacion-cielo.firebasestorage.app",
            messagingSenderId: "1071771625909",
            appId: "1:1071771625909:web:d939265ad6a8e063b3d1fc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function fetchData() {
            const cuerpo = document.getElementById('tabla-cuerpo');
            cuerpo.innerHTML = '<tr><td colspan="7" class="p-10 text-center text-gray-400">Cargando bitácora...</td></tr>';
            
            db.collection("aspirantes_cielo").orderBy("fecha", "desc").get().then((querySnapshot) => {
                cuerpo.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    let color = "text-yellow-600";
                    let dictamen = "DUDOSO";
                    
                    if(d.confiabilidad >= 70 && d.reglas >= 70) { color="text-green-600"; dictamen="APTO"; }
                    if(d.confiabilidad < 50) { color="text-red-600"; dictamen="NO APTO"; }

                    cuerpo.innerHTML += `
                        <tr class="hover:bg-gray-50 border-b">
                            <td class="p-3 text-xs text-gray-500">${d.fecha}</td>
                            <td class="p-3 font-bold text-gray-800">${d.nombre}</td>
                            <td class="p-3 text-center font-bold text-blue-600">${d.confiabilidad}%</td>
                            <td class="p-3 text-center font-bold text-green-600">${d.permanencia}%</td>
                            <td class="p-3 text-center font-bold text-purple-600">${d.reglas}%</td>
                            <td class="p-3 text-center font-bold text-red-600">${d.puntualidad}%</td>
                            <td class="p-3 font-black ${color}">${dictamen}</td>
                        </tr>
                    `;
                });
            });
        }
        fetchData();
    </script>
</body>
</html>
