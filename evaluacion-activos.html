<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualización Manual de Procedimientos - Cielo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-900">Test de Actualización Operativa</h1>
            <p class="text-sm text-gray-500">Manual de Prevención Cielo Parque Residencial</p>
        </header>

        <div id="setup" class="mb-8">
            <label class="block font-bold mb-2">Nombre del Agente:</label>
            <input type="text" id="agente-nombre" class="w-full p-3 border rounded shadow-sm" placeholder="Escriba su nombre completo">
        </div>

        <div id="quiz-container" class="space-y-8"></div>

        <button onclick="enviarEvaluacion()" class="mt-10 w-full bg-blue-800 text-white font-bold py-4 rounded-xl hover:bg-blue-900 shadow-lg">Finalizar y Enviar a Bitácora</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeiIBgmX4KKhdQlwyyXCoI-zGZdFc0aso",
            authDomain: "evaluacion-cielo.firebaseapp.com",
            projectId: "evaluacion-cielo",
            storageBucket: "evaluacion-cielo.firebasestorage.app",
            messagingSenderId: "1071771625909",
            appId: "1:1071771625909:web:d939265ad6a8e063b3d1fc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const preguntasManual = [
            { q: "¿Cuál es la velocidad máxima permitida para escoltar a un proveedor según el manual?", a: ["10 km/h", "20 km/h", "30 km/h"], c: 1 },
            { q: "En caso de un vehículo pesado con riesgo de derrame, ¿dónde debe posicionarse la patrulla?", a: ["Al frente marcando el paso", "A los costados", "A la retaguardia asegurando que no haya daños"], c: 2 },
            { q: "¿A qué distancia mínima (en pies) debemos mantenernos en caso de un allanamiento?", a: ["10 pies", "21 pies (6.5m)", "5 pies"], c: 1 },
            { q: "¿Qué código se aplica cuando un residente otorga una invitación por aplicación (Nivel Medio-Alto)?", a: ["Código Gris", "Código Verde", "Código Naranja"], c: 1 },
            { q: "Según el manual, ¿a qué hora inician las rondas de patrullaje?", a: ["18:00 hrs", "20:00 hrs", "Cuando oscurezca"], c: 0 },
            { q: "Si hay un accidente, ¿dónde debe posicionarse el agente para esperar la ambulancia?", a: ["En el domicilio del accidente", "En la Avenida Sábalo Cerritos", "En la oficina de administración"], c: 1 }
        ];

        let quizHtml = "";
        preguntasManual.forEach((p, i) => {
            quizHtml += `<div class="p-4 border-l-4 border-blue-200 bg-blue-50/30">
                <p class="font-bold text-gray-800 mb-3">${i+1}. ${p.q}</p>
                ${p.a.map((opt, idx) => `
                    <label class="block p-2 bg-white mb-2 border rounded cursor-pointer">
                        <input type="radio" name="p${i}" value="${idx}"> ${opt}
                    </label>
                `).join('')}
            </div>`;
        });
        document.getElementById('quiz-container').innerHTML = quizHtml;

        function enviarEvaluacion() {
            const nombre = document.getElementById('agente-nombre').value;
            if(!nombre) return alert("Por favor ingresa tu nombre");

            let correctas = 0;
            preguntasManual.forEach((p, i) => {
                const sel = document.querySelector(`input[name="p${i}"]:checked`);
                if(sel && parseInt(sel.value) === p.c) correctas++;
            });

            const calificacion = Math.round((correctas / preguntasManual.length) * 100);

            db.collection("evaluaciones_activos").add({
                nombre: nombre,
                fecha: new Date().toLocaleString(),
                calificacion: calificacion,
                estatus: calificacion >= 80 ? "APROBADO" : "REPASAR MANUAL"
            }).then(() => {
                alert("Evaluación enviada con éxito.");
                window.location.href = "menu.html";
            });
        }
    </script>
</body>
</html>
